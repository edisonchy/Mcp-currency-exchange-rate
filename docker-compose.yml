services:
  mcp:
    build: .
    image: exchange-rate-mcp
    env_file:
      - .env
    ports:
      - "127.0.0.1:65535:65535"

  cloudflared:
    image: cloudflare/cloudflared:latest
    depends_on:
      - mcp
    command:
      - tunnel
      - --no-autoupdate
      - --url
      - http://mcp:65535
